name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

env:
  EMSDK_VERSION: "6.0.3"

jobs:
  native:
    name: Native build + tests (gcc-14, C++23)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        env:
          CC: gcc-14
          CXX: g++-14

      - name: Build
        run: cmake --build build --parallel

      # Runs the Catch2 suites plus the acceptance battery
      # (tools/run_acceptance.py via ctest; python3 is preinstalled on runners).
      - name: Test
        run: ctest --test-dir build --output-on-failure

  wasm-web:
    name: WASM build + web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache

      - name: Build WASM module
        run: bash tools/build_wasm.sh

      - name: WASM smoke test (node)
        run: node tools/wasm_smoke.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Type-check (svelte-check)
        run: npm run check
        working-directory: web

      - name: Build web app
        run: npm run build
        working-directory: web

      # The same WASM module (staged into apps/ink/wasm by build_wasm.sh)
      # drives the Ink terminal app; exercise it end-to-end here.
      - name: Install Ink app dependencies
        run: npm ci
        working-directory: apps/ink

      - name: Build Ink app
        run: npm run build
        working-directory: apps/ink

      - name: Ink app e2e (against the WASM engine)
        run: npm run e2e
        working-directory: apps/ink

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  ink:
    name: Ink terminal app (typecheck + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ink/package-lock.json

      - name: Install
        run: npm ci
        working-directory: apps/ink

      - name: Type-check
        run: npm run typecheck
        working-directory: apps/ink

      # Grammar, formatting, caret diagnostics, and the Ink UI, all against a
      # stub engine (no WASM build required — that path is covered by wasm-web).
      - name: Test
        run: npm test
        working-directory: apps/ink

      - name: Build
        run: npm run build
        working-directory: apps/ink
