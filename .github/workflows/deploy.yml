name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Standard GitHub Pages permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  EMSDK_VERSION: "6.0.3"

jobs:
  build:
    name: Build WASM + web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache

      - name: Build WASM module
        run: bash tools/build_wasm.sh

      - name: WASM smoke test (node)
        run: node tools/wasm_smoke.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build web app
        run: npm run build
        working-directory: web

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
