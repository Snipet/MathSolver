name: Deploy to Cloudflare Pages

# Builds the WASM engine + web app in CI (full toolchain control) and pushes
# the finished web/dist to Cloudflare Pages via Direct Upload — no build runs
# in Cloudflare's environment. A push to main deploys production; a pull
# request deploys a preview (only for same-repo branches, which have secrets).
#
# One-time setup:
#   1. Create a Cloudflare Pages project (Direct Upload) named "mathsolver"
#      (or set a repo variable CF_PAGES_PROJECT to your project's name).
#   2. Add repo secrets:
#        CLOUDFLARE_API_TOKEN  — token with the "Cloudflare Pages: Edit" permission
#        CLOUDFLARE_ACCOUNT_ID — your Cloudflare account id

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Supersede in-flight runs for the same ref; don't pile up deploys.
concurrency:
  group: cf-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # let the deploy post the preview URL on PRs

env:
  EMSDK_VERSION: "6.0.3"

jobs:
  deploy:
    name: Build + deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache

      - name: Build WASM module
        run: bash tools/build_wasm.sh

      - name: WASM smoke test
        run: node tools/wasm_smoke.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build web app
        run: npm run build
        working-directory: web

      - name: Deploy to Cloudflare Pages
        # Skip on pull requests from forks (no secrets available there).
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            pages deploy web/dist
            --project-name=${{ vars.CF_PAGES_PROJECT || 'mathsolver' }}
            --branch=${{ github.head_ref || github.ref_name }}
